spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/youth_health_prod?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 5s

security:
  jwt:
    secret: ${JWT_SECRET:ChangeThisJwtSecretToAtLeast32CharsForProd}
    expire-seconds: ${JWT_EXPIRE_SECONDS:86400}
